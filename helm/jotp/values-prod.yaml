# Production environment values for JOTP

replicaCount: 3

image:
  tag: "1.0.0"  # Pin to specific version
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "4"
    memory: "24Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

jvm:
  xmx: "16G"
  xms: "16G"
  gc: "ZGC"
  gcOptions: "-XX:+UseZGC -XX:+DisableExplicitGC -XX:ConcGCThreads=4 -XX:ParallelGCThreads=8"
  extraOpts: "-XX:+AlwaysPreTouch -XX:+PrintGCDetails -XX:+PrintGCTimeStamps -XX:+PrintGCApplicationStoppedTime"

jotp:
  maxProcesses: 10000000  # 10M processes
  cookie: "jotp-prod-cookie-change-me-in-production"
  mailbox:
    capacity: 10000
    fair: true
  supervision:
    strategy: "ONE_FOR_ONE"
    maxRestarts: 10
    maxSeconds: 60

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 minutes
      policies:
      - type: Percent
        value: 30
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 10
        periodSeconds: 60
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2  # Always have 2/3 of nodes available

# High availability spread across AZs
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: jotp
        app.kubernetes.io/instance: jotp-prod
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: jotp
        app.kubernetes.io/instance: jotp-prod

# Node affinity for production
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - jotp
          - key: app.kubernetes.io/instance
            operator: In
            values:
            - jotp-prod
        topologyKey: kubernetes.io/hostname
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/arch
          operator: In
          values:
          - amd64
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
          - "c5.4xlarge"  # AWS or similar instance types
          - "n2-highmem-16"  # GCP or similar

networkPolicy:
  enabled: true

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
    labels:
      release: prometheus-operator

logging:
  level: "INFO"
  format: "json"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: jotp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: jotp-prod-tls
      hosts:
        - jotp.example.com

# Service mesh integration
serviceMesh:
  enabled: true
  annotations:
    sidecar.istio.io/inject: "true"
    traffic.sidecar.istio.io/includeInboundPorts: "8080,9100"
    traffic.sidecar.istio.io/includeOutboundIPRanges: "*"

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # Keep for 30 days
  storageClass: "standard"
  storageSize: "50Gi"

# Health checks with aggressive timeouts
healthChecks:
  liveness:
    enabled: true
    path: /health/live
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health/ready
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 2
    failureThreshold: 3

# Rolling update configuration
rollingUpdate:
  maxUnavailable: 0  # Zero downtime
  maxSurge: 1
