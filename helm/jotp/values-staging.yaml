# Staging environment values for JOTP

replicaCount: 2

image:
  tag: "staging"
  pullPolicy: Always

resources:
  requests:
    cpu: "1"
    memory: "8Gi"
  limits:
    cpu: "2"
    memory: "12Gi"

jvm:
  xmx: "4G"
  xms: "4G"
  gc: "ZGC"

jotp:
  maxProcesses: 500000
  cookie: "jotp-staging-cookie"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true

logging:
  level: "INFO"
  format: "json"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: jotp-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: jotp-staging-tls
      hosts:
        - jotp-staging.example.com
