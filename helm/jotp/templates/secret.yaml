{{- if .Values.secret.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jotp.fullname" . }}-secret
  labels:
    {{- include "jotp.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded values
  # Generate a secure cookie with: openssl rand -base64 32
  cookie: {{ .Values.jotp.cookie | b64enc | quote }}
  {{- with .Values.secret.data }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
---
# Always create the secret for cookie management
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jotp.fullname" . }}-cookie
  labels:
    {{- include "jotp.labels" . | nindent 4 }}
type: Opaque
stringData:
  cookie: {{ .Values.jotp.cookie | quote }}
