name: CI Gate - Quality & Deployment Readiness

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

# Environment for quality gates
env:
  JAVA_VERSION: '26'
  MAVEN_OPTS: >-
    -Xmx2g
    -Xms1g
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
    -Dorg.slf4j.simpleLogger.defaultLogLevel=warn
    -Dmaven.compiler.release=${{ env.JAVA_VERSION }}

jobs:
  # Code quality check
  quality-check:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Check code formatting
        run: |
          echo "🎨 Checking code formatting..."
          mvnd spotless:check
          echo "✅ Code is properly formatted"

      - name: Run static analysis
        run: |
          echo "🔍 Running static analysis..."
          mvnd checkstyle:check
          mvnd pmd:check
          echo "✅ Static analysis passed"

      - name: Check for code smells
        run: |
          echo "👃 Checking for code smells..."
          mvnd spotbugs:check
          echo "✅ No code smells detected"

  # Dependency analysis
  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Check dependency vulnerabilities
        run: |
          echo "🔒 Checking dependency vulnerabilities..."
          mvnd org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=6
          echo "✅ No critical vulnerabilities found"

      - name: Check dependency updates
        run: |
          echo "📦 Checking for dependency updates..."
          mvn versions:display-dependency-updates -DallowSnapshots=false
          echo "✅ Dependencies are up to date"

  # Test coverage
  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          mvnd clean verify -Djacoco.skip=false -T1C

      - name: Check coverage threshold
        run: |
          echo "📊 Checking test coverage..."
          # This assumes JaCoCo is configured
          if [ -f "target/site/jacoco/index.html" ]; then
            echo "✅ JaCoCo report generated"
          else
            echo "❌ JaCoCo report not found"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: 'jdk'

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Build verification
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21', '22', '26']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          java-package: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and verify
        run: |
          echo "🏗️  Building with Java ${{ matrix.java-version }}..."
          mvnd clean verify -T1C
          echo "✅ Build successful with Java ${{ matrix.java-version }}"

  # Deployment readiness check
  deployment-ready:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [quality-check, dependency-check, test-coverage, security-scan, build-verification]
    if: always()
    steps:
      - name: Check deployment prerequisites
        run: |
          echo "🚀 Checking deployment prerequisites..."

          # Check if this is a release tag
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "🎯 Release tag detected"

            # Check required secrets
            SECRETS=(
              "CENTRAL_USERNAME"
              "CENTRAL_TOKEN"
              "GPG_PRIVATE_KEY"
              "GPG_PASSPHRASE"
              "GPG_KEY_ID"
            )

            for secret in "${SECRETS[@]}"; do
              if [ -z "${{ secrets[secret] }}" ]; then
                echo "❌ Missing secret: $secret"
                exit 1
              fi
            done

            echo "✅ All required secrets present"
          else
            echo "📝 Non-release branch - no deployment required"
          fi

      - name: Generate quality gate report
        run: |
          echo "📊 CI Gate Report"
          echo "================"

          echo "🎨 Code Quality: ${{ needs.quality-check.result }}"
          echo "📦 Dependencies: ${{ needs.dependency-check.result }}"
          echo "🧪 Coverage: ${{ needs.test-coverage.result }}"
          echo "🔒 Security: ${{ needs.security-scan.result }}"
          echo "🏗️  Build: ${{ needs.build-verification.result }}"

          echo ""
          echo "🎯 Deployment Status:"

          # Determine if deployment is ready
          if [ "${{ needs.quality-check.result }}" == "success" ] && \
             [ "${{ needs.dependency-check.result }}" == "success" ] && \
             [ "${{ needs.test-coverage.result }}" == "success" ] && \
             [ "${{ needs.security-scan.result }}" == "success" ] && \
             [ "${{ needs.build-verification.result }}" == "success" ]; then

            echo "✅ CI Gate PASSED - Ready for deployment"

            if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref }}" =~ ^refs/tags/v ]]; then
              echo "🚀 Deployment can proceed"
            fi

          else
            echo "❌ CI Gate FAILED - Fix issues before deployment"
            exit 1
          fi