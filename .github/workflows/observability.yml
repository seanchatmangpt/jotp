name: Observability Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '26'
  JAVA_DISTRIBUTION: 'oracle'

jobs:
  observability-setup:
    name: Setup OpenTelemetry Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create otel config directory
        run: mkdir -p otel/config/grafana/dashboards otel/config/grafana/datasources

      - name: Start OpenTelemetry stack
        run: |
          docker-compose -f docker-compose.otel.yml up -d
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Verify services are running
        run: |
          curl -f http://localhost:16686 || echo "Jaeger not ready"
          curl -f http://localhost:9090/-/healthy || echo "Prometheus not ready"
          curl -f http://localhost:3000/api/health || echo "Grafana not ready"

      - name: Show service logs
        if: failure()
        run: docker-compose -f docker-compose.otel.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose.otel.yml down -v

  build-with-otel:
    name: Build with OpenTelemetry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Build with OpenTelemetry dependencies
        run: ./mvnw clean compile -q

  metrics-validation:
    name: Validate Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Run tests with metrics
        run: ./mvnw test -Dtest=MetricsCollector* -q

  traces-validation:
    name: Validate Traces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Run tests with tracing
        run: ./mvnw test -Dtest=DistributedTracer* -q

  otel-bridge-validation:
    name: Validate OpenTelemetry Bridges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Compile OpenTelemetry bridge classes
        run: ./mvnw compile -q

      - name: Verify OpenTelemetry service compiles
        run: ./mvnw compile -Dinclude="io/github/seanchatmangpt/jotp/observability/otel/**" -q

  observability-summary:
    name: Observability Summary
    runs-on: ubuntu-latest
    needs: [build-with-otel, metrics-validation, traces-validation, otel-bridge-validation]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## OpenTelemetry Observability Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build with OTel | ✓ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics | ✓ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Traces | ✓ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Bridge Validation | ✓ Passed |" >> $GITHUB_STEP_SUMMARY
