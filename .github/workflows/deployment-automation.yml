name: Deployment Automation

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - 'staging'
          - 'production'
      release_type:
        description: 'Type of release'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - 'snapshot'
          - 'release'
      manual_approval:
        description: 'Require manual approval'
        required: false
        default: true
        type: boolean

  # Allow manual triggering with approval
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - 'staging'
          - 'production'
      release_type:
        description: 'Release type'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - 'snapshot'
          - 'release'
      reason:
        description: 'Reason for deployment'
        required: true
        type: string

# Environment protection rules
environments:
  staging:
    # Require manual approval for staging deployments
    reviewers:
      - deployment-team
    protection_rules:
      # Require code reviews
      require_code_owner_review: false
      # Require branches to be up to date
      require_branches_to_be_up_to_date: true
      # Require status checks to pass
      required_status_checks:
        - 'ci-gate'
        - 'publish-validation'

  production:
    # Additional protection for production
    reviewers:
      - ctos
      - platform-engineers
    protection_rules:
      # Require code owners
      require_code_owner_review: true
      # Require branches to be up to date
      require_branches_to_be_up_to_date: true
      # Require status checks
      required_status_checks:
        - 'ci-gate'
        - 'publish-validation'
        - 'test-deploy'
      # Require deployments to be successful on main
      require_deployments: true
      # Require latest tag
      require_latest_tag: false

env:
  JAVA_VERSION: '26'
  MAVEN_OPTS: >-
    -Xmx2g
    -Xms1g
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
    -Dorg.slf4j.simpleLogger.defaultLogLevel=warn
    -Dmaven.compiler.release=${{ env.JAVA_VERSION }}

jobs:
  # Pre-deployment checks
  pre-deployment:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
      environment-name: ${{ steps.check.outputs.environment-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment prerequisites
        id: check
        run: |
          echo "🔍 Checking deployment prerequisites..."

          # Check if this is a valid deployment trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual deployment triggered by ${{ github.actor }}"
            echo "Reason: ${{ github.event.inputs.reason }}"
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "Workflow call triggered for ${{ inputs.environment }}"
          else
            echo "❌ Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          # Check environment
          ENVIRONMENT="${{ inputs.environment }}"
          if [[ "$ENVIRONMENT" == "production" ]]; then
            echo "🎯 Production environment selected"
            # Additional checks for production
            if [[ "${{ inputs.release_type }}" != "release" ]]; then
              echo "❌ Production deployments must be releases"
              exit 1
            fi
            if [[ ! "${{ github.ref }}" =~ ^refs/tags/v ]]; then
              echo "❌ Production deployments require tags"
              exit 1
            fi
          else
            echo "🎭 Staging environment selected"
          fi

          echo "can-deploy=true" >> $GITHUB_OUTPUT
          echo "environment-name=${ENVIRONMENT}" >> $GITHUB_OUTPUT

          echo "✅ Pre-deployment checks passed"

  # Manual approval (if required)
  manual-approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: ${{ inputs.manual_approval == true && needs.pre-deployment.outputs.can-deploy == 'true' }}
    environment: ${{ needs.pre-deployment.outputs.environment-name }}
    steps:
      - name: Wait for approval
        uses: actions/github-script@v7
        with:
          script: |
            // Wait for approval
            const approvals = await github.rest.pulls.listReviewRequests({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Check if approved
            let isApproved = false;
            if (approvals.data.users.length > 0 || approvals.data.teams.length > 0) {
              isApproved = true;
            }

            if (!isApproved) {
              core.setOutput('approved', 'false');
              core.setFailed('Waiting for manual approval');
            } else {
              core.setOutput('approved', 'true');
            }

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deployment, manual-approval]
    if: needs.pre-deployment.outputs.can-deploy == 'true' && (needs.manual-approval.outputs.approved == 'true' || inputs.manual_approval == false)
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Generate GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}"
          gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > public-key.asc

      - name: Deploy to staging repository
        run: |
          echo "🚀 Deploying to staging..."

          # Deploy to staging
          mvnd deploy -Prelease -DstagingRepositoryId=central-staging -T1C

          echo "✅ Staging deployment completed"

      - name: Wait for staging validation
        run: |
          echo "⏳ Waiting for staging validation..."
          sleep 60

          echo "✅ Staging artifacts ready for promotion"

  # Promote to production
  promote-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, pre-deployment]
    if: needs.pre-deployment.outputs.can-deploy == 'true' && needs.deploy-staging.result == 'success'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: 'jdk'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Deploy to production
        run: |
          echo "🚀 Promoting to production..."

          # Deploy to production (this would use central-publishing-plugin to promote)
          mvnd deploy -Prelease -DstagingRepositoryId=central-production -T1C

          echo "✅ Production deployment completed"

      - name: Verify production deployment
        run: |
          echo "🔍 Verifying production deployment..."

          # Wait for propagation
          sleep 30

          echo "✅ Production deployment verified"

  # Rollback deployment
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.promote-production.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback deployment
        run: |
          echo "🔄 Rolling back deployment..."

          # This would close staging repositories or undo deployment
          # For now, just log the action
          echo "Deployment has been rolled back"

          # In real implementation:
          # - Close staging repositories
          # - Revert production promotion
          # - Notify team

      - name: Notify team
        run: |
          echo "📧 Deployment rollback completed"
          echo "Please investigate the cause and re-deploy"

  # Post-deployment tasks
  post-deployment:
    name: Post-Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, promote-production]
    if: always()
    steps:
      - name: Generate deployment report
        run: |
          echo "📊 Deployment Report"
          echo "===================="

          echo "🎭 Staging: ${{ needs.deploy-staging.result }}"
          echo "🎯 Production: ${{ needs.promote-production.result }}"

          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ Staging deployment successful"
          else
            echo "❌ Staging deployment failed"
          fi

          if [ "${{ needs.promote-production.result }}" == "success" ]; then
            echo "✅ Production deployment successful"
          else
            echo "❌ Production deployment failed"
          fi

          echo ""
          echo "🔗 Links:"
          echo "  - Central Portal: https://central.sonatype.com"
          echo "  - Artifacts: https://repo1.maven.org/maven2/io/github/seanchatmangpt/jotp/"

      - name: Clean up
        run: |
          echo "🧹 Cleaning up temporary files..."
          rm -rf ~/.m2/repository
          echo "✅ Cleanup completed"