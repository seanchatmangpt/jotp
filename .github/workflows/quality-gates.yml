name: Quality Gates Validation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.yml'
      - '**/*.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      check_quality:
        description: 'Run quality gate checks'
        type: boolean
        default: true
      check_dependencies:
        description: 'Check dependency vulnerabilities'
        type: boolean
        default: true
      check_security:
        description: 'Run security scans'
        type: boolean
        default: true

env:
  MAVEN_OPTS: -Djava.awt.headless=true
  JAVA_HOME: /usr/lib/jvm/openjdk-26

jobs:
  validate-guards:
    name: Guard Validation
    runs-on: ubuntu-latest
    outputs:
      guard-passed: ${{ steps.guards.outputs.guard-passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: 26
          cache: 'maven'

      - name: Install mvnd
        run: |
          curl -L -o mvnd.tar.gz https://github.com/apache/maven-mvnd/releases/download/2.0.0-rc-3/maven-mvnd-2.0.0-rc-3-linux-amd64.tar.gz
          tar -xzf mvnd.tar.gz
          export PATH="$PWD/maven-mvnd-2.0.0-rc-3/bin:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Validate guard patterns
        id: guards
        run: |
          echo "🛡️ Running guard validation..."

          # Check for TODO/FIXME patterns
          if grep -r -i -E "(TODO|FIXME|HACK|XXX)" --include="*.java" src/ ||
             grep -r -i -E "(TODO|FIXME|HACK|XXX)" --include="*.java" src/; then
            echo "❌ Found TODO/FIXME patterns in source code"
            echo "📋 These patterns are forbidden in production code"
            echo "💡 Implement or remove these items"
            echo "guard-passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check for mock/stub implementations
          if find src/ -name "*.java" -exec grep -l -E "(Mock|Stub|Fake).*implements" {} \; | head -5; then
            echo "❌ Found mock/stub implementations in production code"
            echo "📋 Mock implementations are not allowed in production builds"
            echo "guard-passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check for empty/placeholder methods
          if find src/ -name "*.java" -exec grep -l "throw new UnsupportedOperationException()" {} \; | head -5; then
            echo "❌ Found placeholder implementations"
            echo "📋 UnsupportedOperationException placeholders must be implemented or removed"
            echo "guard-passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "✅ All guard patterns validated successfully"
          echo "guard-passed=true" >> $GITHUB_OUTPUT

  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    outputs:
      quality-passed: ${{ steps.quality.outputs.passed }}
      compilation-result: ${{ steps.compile.outputs.result }}
    needs: validate-guards
    if: github.event.inputs.check_quality == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: 26
          cache: 'maven'

      - name: Install mvnd
        run: |
          curl -L -o mvnd.tar.gz https://github.com/apache/maven-mvnd/releases/download/2.0.0-rc-3/maven-mvnd-2.0.0-rc-3-linux-amd64.tar.gz
          tar -xzf mvnd.tar.gz
          export PATH="$PWD/maven-mvnd-2.0.0-rc-3/bin:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Compile with coverage
        id: compile
        run: |
          ./mvnd clean compile -T1C -Dgpg.skip=true -Dcheckstyle.skip=true || {
            echo "❌ Compilation failed"
            echo "compile-result=failure" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "✅ Compilation successful"
          echo "compile-result=success" >> $GITHUB_OUTPUT

      - name: Check code formatting
        id: quality
        run: |
          ./mvnd spotless:check -Dgpg.skip=true || {
            echo "❌ Code formatting failed"
            echo "run ./mvnd spotless:apply to fix"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          }

          ./mvnd checkstyle:check -Dgpg.skip=true || {
            echo "⚠️ Checkstyle issues found but continuing"
            echo "passed=false" >> $GITHUB_OUTPUT
          }

          echo "✅ Code quality checks passed"
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Run test suite
        run: |
          ./mvnd test -Dmaven.test.failure.ignore=true -T1C -Dgpg.skip=true -Dcheckstyle.skip=true || {
            echo "❌ Test suite failures"
            exit 1
          }
          echo "✅ Test suite passed"

      - name: JaCoCo coverage check
        run: |
          ./mvnd test jacoco:report jacoco:check -Djacoco.skip=false -Dgpg.skip=true -T1C || {
            echo "❌ Coverage requirements not met"
            exit 1
          }
          echo "✅ JaCoCo coverage requirements met"

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    outputs:
      dependency-clean: ${{ steps.dependency.outputs.clean }}
      vulnerabilities-found: ${{ steps.dependency.outputs.vulns }}
    needs: validate-guards
    if: github.event.inputs.check_dependencies == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: 26
          cache: 'maven'

      - name: Install mvnd
        run: |
          curl -L -o mvnd.tar.gz https://github.com/apache/maven-mvnd/releases/download/2.0.0-rc-3/maven-mvnd-2.0.0-rc-3-linux-amd64.tar.gz
          tar -xzf mvnd.tar.gz
          export PATH="$PWD/maven-mvnd-2.0.0-rc-3/bin:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Build dependency tree
        run: |
          ./mvnd dependency:tree -DoutputType=dot -Dgpg.skip=true > dependency-tree.txt

      - name: Check for duplicated dependencies
        id: dependency
        run: |
          ./mvnd dependency:tree -Dverbose | grep -E "DUPLICATE" || {
            echo "✅ No duplicate dependencies found"
            echo "clean=true" >> $GITHUB_OUTPUT
          }

          # Run security check
          ./mvnd org.owasp:dependency-check-maven:check -Dgpg.skip=true || {
            echo "⚠️ Security vulnerabilities found in dependencies"
            echo "vulns=true" >> $GITHUB_OUTPUT
          }

          echo "dependency-check-completed=true" >> $GITHUB_OUTPUT

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      security-passed: ${{ steps.security.outputs.passed }}
    needs: validate-guards
    if: github.event.inputs.check_security == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Bandit security scan
        run: |
          pip install bandit[toml]
          bandit -r src/main/java -f json -o bandit-report.json || {
            echo "❌ Security issues found"
            exit 1
          }
          echo "✅ Security scan passed"

      - name: Check for hardcoded secrets
        id: security
        run: |
          # Check for common secret patterns
          if grep -r -i -E "(password|secret|key|token)" --include="*.java" src/main/ | grep -v "com.example" | grep -v "test" | head -5; then
            echo "⚠️ Potential hardcoded secrets found - investigate manually"
            echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "✅ No hardcoded secrets detected"
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    outputs:
      integration-passed: ${{ steps.integration.outputs.passed }}
    needs: [quality-check, dependency-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: 26
          cache: 'maven'

      - name: Install mvnd
        run: |
          curl -L -o mvnd.tar.gz https://github.com/apache/maven-mvnd/releases/download/2.0.0-rc-3/maven-mvnd-2.0.0-rc-3-linux-amd64.tar.gz
          tar -xzf mvnd.tar.gz
          export PATH="$PWD/maven-mvnd-2.0.0-rc-3/bin:$PATH"
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Run integration tests
        id: integration
        run: |
          ./mvnw verify -Dit.test="*" -DfailIfNoTests=false -Dgpg.skip=true -T1C || {
            echo "❌ Integration tests failed"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "✅ Integration tests passed"
          echo "passed=true" >> $GITHUB_OUTPUT

  final-report:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [validate-guards, quality-check, dependency-check, security-scan, integration-tests]
    if: always()

    steps:
      - name: Generate quality report
        run: |
          echo "📋 JOTP Quality Gate Report" > quality-report.txt
          echo "==================================" >> quality-report.txt
          echo "Timestamp: $(date)" >> quality-report.txt
          echo "Branch: ${{ github.ref }}" >> quality-report.txt
          echo "Event: ${{ github.event_name }}" >> quality-report.txt
          echo "" >> quality-report.txt

          echo "Guard Validation: ${{ needs.validate-guards.outputs.guard-passed }}" >> quality-report.txt
          echo "Code Quality: ${{ needs.quality-check.outputs.quality-passed }}" >> quality-report.txt
          echo "Dependency Check: ${{ needs.dependency-check.outputs.dependency-clean }}" >> quality-report.txt
          echo "Security Scan: ${{ needs.security-scan.outputs.security-passed }}" >> quality-report.txt
          echo "Integration Tests: ${{ needs.integration-tests.outputs.integration-passed }}" >> quality-report.txt
          echo "" >> quality-report.txt

          if [ "${{ needs.validate-guards.outputs.guard-passed }}" == "true" ] && \
             [ "${{ needs.quality-check.outputs.quality-passed }}" == "true" ] && \
             [ "${{ needs.dependency-check.outputs.dependency-clean }}" == "true" ] && \
             [ "${{ needs.security-scan.outputs.security-passed }}" == "true" ] && \
             [ "${{ needs.integration-tests.outputs.integration-passed }}" == "true" ]; then
            echo "🎉 ALL QUALITY GATES PASSED!" >> quality-report.txt
            echo "✅ Ready for deployment" >> quality-report.txt
          else
            echo "❌ Quality gates not fully met" >> quality-report.txt
            echo "⚠️ Manual review required" >> quality-report.txt
          fi

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.txt
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        run: |
          QUALITY_STATUS="❌ Failed"
          if [ "${{ needs.validate-guards.outputs.guard-passed }}" == "true" ] && \
             [ "${{ needs.quality-check.outputs.quality-passed }}" == "true" ] && \
             [ "${{ needs.dependency-check.outputs.dependency-clean }}" == "true" ] && \
             [ "${{ needs.security-scan.outputs.security-passed }}" == "true" ] && \
             [ "${{ needs.integration-tests.outputs.integration-passed }}" == "true" ]; then
            QUALITY_STATUS="✅ Passed"
          fi

          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments \
            -d "{\"body\":\"🛡️ Quality Gate Status: $QUALITY_STATUS\n📋 View full report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n✅ Guards: ${{ needs.validate-guards.outputs.guard-passed }} | 🔍 Code Quality: ${{ needs.quality-check.outputs.quality-passed }} | 📦 Dependencies: ${{ needs.dependency-check.outputs.dependency-clean }} | 🔒 Security: ${{ needs.security-scan.outputs.security-passed }} | 🧪 Integration: ${{ needs.integration-tests.outputs.integration-passed }}\"}"