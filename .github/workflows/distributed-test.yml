name: Distributed Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly 2 AM Sunday
  workflow_dispatch:

env:
  JAVA_DISTRIBUTION: 'temurin'
  KIND_VERSION: 'v0.22.0'
  KIND_IMAGE: 'kindest/node:v1.29.0'

jobs:
  # Kind cluster creation
  create-cluster:
    name: Create Kind Cluster
    runs-on: ubuntu-latest
    outputs:
      cluster-name: ${{ steps.cluster.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Kind cluster
        id: cluster
        run: |
          CLUSTER_NAME="jotp-distributed-${{ github.run_id }}"
          cat > kind-config.yaml << EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            image: ${{ env.KIND_IMAGE }}
          - role: worker
            image: ${{ env.KIND_IMAGE }}
          - role: worker
            image: ${{ env.KIND_IMAGE }}
          - role: worker
            image: ${{ env.KIND_IMAGE }}
          networking:
            disableDefaultCNI: false
          EOF

          kind create cluster \
            --name $CLUSTER_NAME \
            --config kind-config.yaml

          echo "name=$CLUSTER_NAME" >> $GITHUB_OUTPUT

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Install chaos-mesh (optional)
        continue-on-error: true
        run: |
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm install chaos-mesh chaos-mesh/chaos-mesh \
            --namespace chaos-testing \
            --set chaosDaemon.runtime=containerd \
            --set chaosDaemon.socketPath=/run/containerd/containerd.sock \
            --create-namespace

      - name: Save kubeconfig
        run: |
          kind get kubeconfig --name ${{ steps.cluster.outputs.name }} > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: cluster-kubeconfig
          path: kubeconfig
          retention-days: 1

  # Multi-node deployment
  deploy-distributed:
    name: Deploy Multi-Node JOTP
    runs-on: ubuntu-latest
    needs: create-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: cluster-kubeconfig

      - name: Set kubectl context
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl cluster-info

      - name: Build JOTP Docker image
        run: |
          docker build -f docker/Dockerfile \
            -t jotp/distributed:${{ github.sha }} \
            --build-arg JAVA_VERSION=26 \
            .

      - name: Load image into Kind
        run: |
          kind load docker-image jotp/distributed:${{ github.sha }} \
            --name ${{ needs.create-cluster.outputs.cluster-name }}

      - name: Deploy JOTP cluster
        run: |
          kubectl apply -f k8s/distributed/
          kubectl rollout status deployment/jotp-cluster --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -l app=jotp-cluster
          kubectl get svc/jotp-cluster

      - name: Port forward for testing
        run: |
          kubectl port-forward svc/jotp-cluster 8080:8080 &
          sleep 5
          curl -f http://localhost:8080/health || exit 1

  # Chaos engineering tests
  chaos-tests:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    needs: [create-cluster, deploy-distributed]

    strategy:
      matrix:
        scenario:
          - pod-kill
          - network-latency
          - cpu-stress
          - memory-stress

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: cluster-kubeconfig

      - name: Set kubectl context
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl cluster-info

      - name: Run chaos scenario ${{ matrix.scenario }}
        run: |
          case "${{ matrix.scenario }}" in
            pod-kill)
              kubectl apply -f k8s/chaos/pod-kill.yaml
              ;;
            network-latency)
              kubectl apply -f k8s/chaos/network-latency.yaml
              ;;
            cpu-stress)
              kubectl apply -f k8s/chaos/cpu-stress.yaml
              ;;
            memory-stress)
              kubectl apply -f k8s/chaos/memory-stress.yaml
              ;;
          esac

      - name: Wait for chaos injection
        run: sleep 30

      - name: Verify system recovery
        run: |
          kubectl get pods -l app=jotp-cluster
          kubectl logs -l app=jotp-cluster --tail=50

          # Verify all pods are Running/Ready
          READY=$(kubectl get pods -l app=jotp-cluster -o jsonpath='{.items[*].status.containerStatuses[0].ready}')
          if [[ "$READY" != *"true true"* ]]; then
            echo "❌ Pods not ready after chaos test"
            exit 1
          fi

      - name: Run distributed tests during chaos
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl port-forward svc/jotp-cluster 8080:8080 &
          PF_PID=$!
          sleep 5

          # Run distributed test suite
          ./mvnw test -Dtest=DistributedChaosTest \
            -Dtest.endpoint=http://localhost:8080 \
            -Dtest.scenario=${{ matrix.scenario }} \
            --no-transfer-progress

          kill $PF_PID

      - name: Cleanup chaos resources
        if: always()
        run: |
          kubectl delete -f k8s/chaos/${{ matrix.scenario }}.yaml --ignore-not-found=true

  # Performance regression tests
  perf-regression:
    name: Distributed Performance Tests
    runs-on: ubuntu-latest
    needs: [create-cluster, deploy-distributed]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: cluster-kubeconfig

      - name: Set kubectl context
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl cluster-info

      - name: Run distributed benchmarks
        run: |
          kubectl port-forward svc/jotp-cluster 8080:8080 &
          PF_PID=$!
          sleep 5

          # Execute distributed performance test suite
          ./mvnw verify -Pbenchmark \
            -Dtest.distributed=true \
            -Dtest.endpoint=http://localhost:8080 \
            -Dbenchmark.nodes=3 \
            --no-transfer-progress

          kill $PF_PID

      - name: Collect metrics from cluster
        run: |
          kubectl top pods -l app=jotp-cluster --containers
          kubectl top nodes

      - name: Gather logs
        if: always()
        run: |
          kubectl logs -l app=jotp-cluster --tail=100 > distributed-logs.txt

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: distributed-perf-results
          path: |
            target/benchmark-results.json
            distributed-logs.txt
          retention-days: 30

  # Network partition tests
  network-partition:
    name: Network Partition Tests
    runs-on: ubuntu-latest
    needs: [create-cluster, deploy-distributed]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: cluster-kubeconfig

      - name: Set kubectl context
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl cluster-info

      - name: Simulate network partition
        run: |
          # Create network partition between worker nodes
          kubectl apply -f k8s/chaos/network-partition.yaml
          sleep 60

      - name: Verify split-brain resolution
        run: |
          kubectl get pods -l app=jotp-cluster -o wide
          kubectl logs -l app=jotp-cluster --tail=50 | grep -i "partition\|recovery\|leader" || true

      - name: Test during partition
        run: |
          kubectl port-forward svc/jotp-cluster 8080:8080 &
          PF_PID=$!
          sleep 5

          # Run resilience tests
          ./mvnw test -Dtest=NetworkPartitionResilienceTest \
            -Dtest.endpoint=http://localhost:8080 \
            --no-transfer-progress || true

          kill $PF_PID

      - name: Restore network
        if: always()
        run: |
          kubectl delete -f k8s/chaos/network-partition.yaml --ignore-not-found=true

      - name: Verify recovery after partition
        run: |
          sleep 30
          kubectl get pods -l app=jotp-cluster
          READY=$(kubectl get pods -l app=jotp-cluster -o jsonpath='{.items[*].status.containerStatuses[0].ready}')
          if [[ "$READY" != *"true true"* ]]; then
            echo "❌ Cluster did not recover from network partition"
            exit 1
          fi

  # Cleanup
  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    needs: [chaos-tests, perf-regression, network-partition]
    if: always()

    steps:
      - name: Delete Kind cluster
        run: |
          kind delete cluster --name jotp-distributed-${{ github.run_id }} || true

      - name: Clean up Docker resources
        run: |
          docker system prune -f || true
