name: Build CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'release/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: '-Xmx3072m -XX:MaxMetaspaceSize=512m'

jobs:
  # Multi-JDK validation matrix
  multi-jdk-test:
    name: JDK ${{ matrix.java }} - ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '22', '23']
        profile: ['core', 'archive-infra', 'archive-experimental']
        exclude:
          # Only JDK 26 supports all experimental features
          - java: '21'
            profile: 'archive-experimental'
          - java: '22'
            profile: 'archive-experimental'
          - java: '23'
            profile: 'archive-experimental'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build with profile ${{ matrix.profile }}
        run: |
          ./mvnw clean compile -P${{ matrix.profile }} -T1C \
            -DskipTests \
            --no-transfer-progress

      - name: Run unit tests
        run: |
          ./mvnw test -P${{ matrix.profile }} \
            -DargLine="--enable-preview" \
            --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk${{ matrix.java }}-${{ matrix.profile }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # JDK 26 with preview features (main target)
  jdk26-preview:
    name: JDK 26 Preview - Full Validation
    runs-on: ubuntu-latest
    needs: multi-jdk-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          java-package: 'jdk'
          cache: 'maven'

      - name: Enable preview features
        run: |
          echo "JAVA_TOOL_OPTIONS=--enable-preview" >> $GITHUB_ENV

      - name: Compile all sources
        run: |
          ./mvnw clean compile -T1C \
            -DcompilerArgs="--enable-preview" \
            --no-transfer-progress

      - name: Run all unit tests
        run: |
          ./mvnw test \
            -DargLine="--enable-preview" \
            --no-transfer-progress

      - name: Run integration tests
        run: |
          ./mvnw verify -DskipTests \
            -Dfailsafe.argLine="--enable-preview" \
            --no-transfer-progress

      - name: Validate Javadocs
        run: |
          ./mvnw javadoc:javadoc \
            -DenablePreview=true \
            --no-transfer-progress

      - name: Run code quality checks
        run: |
          ./mvnw spotless:check \
            --no-transfer-progress

      - name: Run guard validation
        run: |
          ./dx.sh validate

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results JDK 26
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-jdk26
          path: '**/target/jacoco.exec'
          retention-days: 7

  # Docker build validation
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: jdk26-preview

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile \
            -t jotp:ci-${{ github.sha }} \
            --build-arg JAVA_VERSION=26 \
            .

      - name: Run smoke tests in container
        run: |
          docker run --rm jotp:ci-${{ github.sha }} \
            java --version

      - name: Export image
        run: |
          docker save jotp:ci-${{ github.sha }} \
            -o /tmp/jotp-ci.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-jotp
          path: /tmp/jotp-ci.tar
          retention-days: 7

  # Benchmark regression detection
  benchmark-validation:
    name: Performance Benchmark Validation
    runs-on: ubuntu-latest
    needs: jdk26-preview

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          java-package: 'jdk'
          cache: 'maven'

      - name: Run JMH benchmarks
        run: |
          ./mvnw verify -Pbenchmark \
            -Dexec.args="-f 1 -wi 1 -i 2 -rff target/benchmark-results.json -rf json" \
            --no-transfer-progress

      - name: Compare against baseline
        id: benchmark-compare
        continue-on-error: true
        run: |
          # Download baseline from last successful main build
          curl -H "Accept: application/vnd.github.v3.raw" \
            -o baseline.json \
            "https://api.github.com/repos/seanchatmangpt/jotp/actions/artifacts/${{ github.event.pull_request.base.sha }}" || true

          if [ -f baseline.json ]; then
            scripts/analyze_variance.py baseline.json target/benchmark-results.json || true
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: target/benchmark-results.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('target/benchmark-results.json', 'utf8'));
            const summary = results.map(r => `${r.benchmark}: ${r.score}`).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Benchmark Results\n\`\`\`\n${summary}\n\`\`\``
            });

  # Code coverage (Jacoco)
  coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    needs: jdk26-preview

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          java-package: 'jdk'
          cache: 'maven'

      - name: Run tests with Jacoco
        run: |
          ./mvnw test jacoco:report \
            -DargLine="--enable-preview" \
            --no-transfer-progress

      - name: Check coverage thresholds
        run: |
          ./mvnw jacoco:check \
            -Djacoco.check.line.covered=0.80 \
            --no-transfer-progress

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: '**/target/site/jacoco/jacoco.xml'
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate coverage summary
        run: |
          echo "Coverage Summary:" >> $GITHUB_STEP_SUMMARY
          grep -oPm 2 'Total.*?\d+[%,]\s*\d+[%,]' target/site/jacoco/index.html || true

  # Security scanning
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: jdk26-preview

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'target'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: dependency-check-report
          retention-days: 30

      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Final status check
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [multi-jdk-test, jdk26-preview, docker-build, benchmark-validation, coverage, security-scan]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.multi-jdk-test.result }}" != "success" ] || \
             [ "${{ needs.jdk26-preview.result }}" != "success" ] || \
             [ "${{ needs.docker-build.result }}" != "success" ] || \
             [ "${{ needs.benchmark-validation.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "❌ Build pipeline failed"
            exit 1
          fi
          echo "✅ All checks passed"
