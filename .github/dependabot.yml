version: 2
updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "seanchatmangpt"
    assignees:
      - "seanchatmangpt"
    labels:
      - "dependencies"
      - "java"
      - "maven"
    commit-message:
      prefix: "deps(maven)"
      prefix-development: "chore(maven)"
      include: "scope"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Keep JUnit 5.12.2 for Java 26 compatibility
      - dependency-name: "org.junit:junit-bom"
        versions: ["5.13.0"]
      # Keep gRPC 1.60.0 for stability
      - dependency-name: "io.grpc:*"
        versions: ["1.61.0", "1.62.0"]
    groups:
      jupiter:
        patterns:
          - "org.junit.jupiter:*"
      testing:
        patterns:
          - "org.assertj:*"
          - "org.awaitility:*"
          - "net.jqwik:*"
          - "org.instancio:*"
      benchmarks:
        patterns:
          - "org.openjdk.jmh:*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "seanchatmangpt"
    assignees:
      - "seanchatmangpt"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "seanchatmangpt"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"

  # Helm charts
  - package-ecosystem: "helm"
    directory: "/helm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "seanchatmangpt"
    labels:
      - "dependencies"
      - "helm"
      - "kubernetes"
    commit-message:
      prefix: "deps(helm)"
      include: "scope"

  # Terraform modules
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "seanchatmangpt"
    labels:
      - "dependencies"
      - "terraform"
      - "iac"
    commit-message:
      prefix: "deps(terraform)"
      include: "scope"
