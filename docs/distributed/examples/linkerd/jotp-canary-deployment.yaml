# Linkerd canary deployment example for JOTP
# Demonstrates traffic splitting using SMI TrafficSplit

apiVersion: v1
kind: Namespace
metadata:
  name: jotp-system
  annotations:
    linkerd.io/inject: enabled
---
# Stable version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jotp-telemetry
  namespace: jotp-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jotp-telemetry
      version: v1
  template:
    metadata:
      labels:
        app: jotp-telemetry
        version: v1
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
      - name: jotp
        image: jotp/telemetry-service:1.0.0
        ports:
        - containerPort: 8080
        - containerPort: 9090
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
# Canary version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jotp-telemetry-canary
  namespace: jotp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jotp-telemetry
      version: v2
  template:
    metadata:
      labels:
        app: jotp-telemetry
        version: v2
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
      - name: jotp
        image: jotp/telemetry-service:2.0.0-canary
        ports:
        - containerPort: 8080
        - containerPort: 9090
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
# Service for stable version
apiVersion: v1
kind: Service
metadata:
  name: jotp-telemetry
  namespace: jotp-system
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  - port: 9090
    name: grpc
    targetPort: 9090
  selector:
    app: jotp-telemetry
    version: v1
---
# Service for canary version
apiVersion: v1
kind: Service
metadata:
  name: jotp-telemetry-canary
  namespace: jotp-system
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  - port: 9090
    name: grpc
    targetPort: 9090
  selector:
    app: jotp-telemetry
    version: v2
---
# Traffic split: 95% stable, 5% canary
apiVersion: split.smi-spec.io/v1alpha2
kind: TrafficSplit
metadata:
  name: jotp-telemetry-canary
  namespace: jotp-system
spec:
  service: jotp-telemetry
  backends:
  - service: jotp-telemetry
    weight: 95
  - service: jotp-telemetry-canary
    weight: 5
