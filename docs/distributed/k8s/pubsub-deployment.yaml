---
# Distributed Pub/Sub Cluster
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jotp-pubsub
  namespace: jotp-distributed
  labels:
    app: jotp-pubsub
    example: distributed-pubsub
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jotp-pubsub
  template:
    metadata:
      labels:
        app: jotp-pubsub
        example: distributed-pubsub
    spec:
      containers:
      - name: pubsub
        image: jotp:latest
        imagePullPolicy: IfNotPresent
        command: ["java"]
        args:
          - "-XX:+UseZGC"
          - "-Xms512m"
          - "-Xmx1g"
          - "io.github.seanchatmangpt.jotp.examples.DistributedPubSubExample"
          - "node-$(POD_NAME)"
          - "9091"
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: JAVA_OPTS
            value: "-XX:+UseZGC -Xms512m -Xmx1g"
        ports:
          - containerPort: 9091
            name: pubsub
            protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 9091
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9091
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jotp-pubsub
  namespace: jotp-distributed
  labels:
    app: jotp-pubsub
spec:
  type: ClusterIP
  ports:
    - port: 9091
      targetPort: 9091
      protocol: TCP
      name: pubsub
  selector:
    app: jotp-pubsub
---
apiVersion: v1
kind: Service
metadata:
  name: jotp-pubsub-external
  namespace: jotp-distributed
  labels:
    app: jotp-pubsub
spec:
  type: LoadBalancer
  ports:
    - port: 9091
      targetPort: 9091
      protocol: TCP
  selector:
    app: jotp-pubsub
