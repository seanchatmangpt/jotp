---
# Distributed Cache Cluster
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jotp-cache
  namespace: jotp-distributed
  labels:
    app: jotp-cache
    example: distributed-cache
spec:
  serviceName: jotp-cache
  replicas: 3
  selector:
    matchLabels:
      app: jotp-cache
  template:
    metadata:
      labels:
        app: jotp-cache
        example: distributed-cache
    spec:
      containers:
      - name: cache
        image: jotp:latest
        imagePullPolicy: IfNotPresent
        command: ["java"]
        args:
          - "-XX:+UseZGC"
          - "-Xms512m"
          - "-Xmx1g"
          - "io.github.seanchatmangpt.jotp.examples.DistributedCacheExample"
          - "$(NODE_NAME)"
          - "6081"
          - "2"
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: JAVA_OPTS
            value: "-XX:+UseZGC -Xms512m -Xmx1g"
        ports:
          - containerPort: 6081
            name: cache
            protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 6081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6081
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jotp-cache
  namespace: jotp-distributed
  labels:
    app: jotp-cache
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6081
      targetPort: 6081
      protocol: TCP
      name: cache
  selector:
    app: jotp-cache
---
apiVersion: v1
kind: Service
metadata:
  name: jotp-cache-external
  namespace: jotp-distributed
  labels:
    app: jotp-cache
spec:
  type: LoadBalancer
  ports:
    - port: 6081
      targetPort: 6081
      protocol: TCP
  selector:
    app: jotp-cache
