apiVersion: v1
kind: Service
metadata:
  name: jotp-headless
  namespace: default
  labels:
    app: jotp
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: monitoring
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: jotp
---
apiVersion: v1
kind: Service
metadata:
  name: jotp
  namespace: default
  labels:
    app: jotp
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: monitoring
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: jotp
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: jotp-monitoring
  namespace: default
  labels:
    app: jotp
    component: monitoring
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: jotp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jotp-ingress
  namespace: default
  labels:
    app: jotp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: jotp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jotp
            port:
              number: 8080
