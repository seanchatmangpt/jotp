[book]
title = "Engineering Java Applications"
subtitle = "Navigate Each Stage of Software Delivery with JOTP"
authors = ["seanchatmangpt"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"

[output.html]
theme = "ayu"
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/seanchatmangpt/jotp"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/seanchatmangpt/jotp/edit/main/docs/book/src/{path}"
additional-css = []
no-section-label = false
fold.enable = true
fold.level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[preprocessor.index]
[preprocessor.links]
