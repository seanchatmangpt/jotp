# Maven Daemon (mvnd) configuration
# See https://github.com/apache/maven-mvnd

# Keep daemon alive for 6 hours (long dev sessions)
mvnd.idleTimeout=6h

# Max keepalive packets before considering daemon lost
mvnd.maxLostKeepAlive=30

# Number of builder threads (0 = auto-detect based on CPU cores)
mvnd.threads=0

# Enable build cache integration
mvnd.buildCacheEnabled=true

# Trust all SSL certificates (needed for proxy environments)
mvnd.jvmArgs=-Dmaven.wagon.http.ssl.insecure=true -Dmaven.wagon.http.ssl.allowall=true -Djavax.net.ssl.trustAll=true
