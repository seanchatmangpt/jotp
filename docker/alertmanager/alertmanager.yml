# AlertManager Configuration for JOTP
global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@jotp-cluster.local'
  smtp_auth_username: 'alertmanager@jotp-cluster.local'
  smtp_auth_password: 'password'

# Route configuration
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'

  # Routes for specific severity levels
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true

    - match:
        severity: warning
      receiver: 'warning-receiver'

    - match_re:
        service: (jotp|database|cache)
      receiver: 'infra-receiver'

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  - source_match:
      alertname: 'JOTPNodeDown'
    target_match_re:
      alertname: 'JOTP.*'
    equal: ['instance']

# Receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'team@jotp-cluster.local'
        headers:
          Subject: '[JOTP] {{ .GroupLabels.alertname }}'

  - name: 'critical-receiver'
    email_configs:
      - to: 'oncall@jotp-cluster.local'
        headers:
          Subject: '[CRITICAL] JOTP Cluster Alert'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        channel: '#jotp-critical'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning-receiver'
    email_configs:
      - to: 'team@jotp-cluster.local'
        headers:
          Subject: '[WARNING] JOTP Cluster Alert'

  - name: 'infra-receiver'
    webhook_configs:
      - url: 'http://infra-bot:8080/alerts'
