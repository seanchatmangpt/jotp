# Prometheus Configuration for JOTP Cluster
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'jotp-cluster'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # JOTP Cluster Nodes
  - job_name: 'jotp-cluster'
    static_configs:
      - targets:
          - 'jotp-node-1:9090'
          - 'jotp-node-2:9090'
          - 'jotp-node-3:9090'
        labels:
          service: 'jotp'
          cluster: 'jotp-cluster'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['jotp-node-exporter:9100']
        labels:
          service: 'system-metrics'

  # Process Exporter - JVM process metrics
  - job_name: 'process-exporter'
    static_configs:
      - targets: ['jotp-process-exporter:9256']
        labels:
          service: 'process-metrics'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'container-metrics'

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'database'

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'monitoring'

  # AlertManager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alerting'

  # NATS Monitoring
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
        labels:
          service: 'messaging'

  # Kafka JMX Exporter
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: 'streaming'

  # RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'message-broker'
